<!doctype html>
<html lang="id">
  <head>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1e5c33" />
    <link
      rel="apple-touch-icon"
      href="https://cdn-icons-png.flaticon.com/512/3062/3062634.png"
    />
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Login - Catatan Keuangan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap");

      body {
        background-color: #1a2f26;
        font-family: "Plus Jakarta Sans", sans-serif;
        color: #1a2f26;
      }
      /* Custom styles for PIN input indicators */
      .pin-indicator {
        transition: background-color 0.3s ease;
      }
      .pin-indicator-filled {
        background-color: #ffffff; /* White when filled */
      }
      .pin-indicator-empty {
        background-color: #064e3b; /* Dark color for empty */
      }
    </style>
  </head>
  <body class="p-3 md:p-6 pb-10">
    <div
      id="toastContainer"
      class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-3 pointer-events-none w-full max-w-sm px-4"
    ></div>

    <!-- PIN SCREEN CONTAINER -->
    <div
      id="pinScreen"
      class="fixed inset-0 z-[70] bg-gradient-to-br from-[#1a2f26] via-[#101f18] to-black flex items-center justify-center p-4 transition-opacity duration-500"
    >
      <div class="text-center">
        <h1 class="text-2xl font-extrabold text-white tracking-tight mb-6">
          Masukkan PIN Gerbang
        </h1>
        <div id="pinDisplay" class="flex justify-center space-x-4 mb-8">
          <!-- Visual indicators for PIN digits -->
          <div class="pin-indicator pin-indicator-empty w-4 h-4 rounded-full"></div>
          <div class="pin-indicator pin-indicator-empty w-4 h-4 rounded-full"></div>
          <div class="pin-indicator pin-indicator-empty w-4 h-4 rounded-full"></div>
          <div class="pin-indicator pin-indicator-empty w-4 h-4 rounded-full"></div>
        </div>
        <div id="pinKeypad" class="grid grid-cols-3 gap-4 w-64 mx-auto">
          <button class="keypad-btn p-4 rounded-lg bg-white/10 text-white font-bold text-lg focus:outline-none focus:ring-2 focus:ring-green-500">1</button>
          <button class="keypad-btn p-4 rounded-lg bg-white/10 text-white font-bold text-lg focus:outline-none focus:ring-2 focus:ring-green-500">2</button>
          <button class="keypad-btn p-4 rounded-lg bg-white/10 text-white font-bold text-lg focus:outline-none focus:ring-2 focus:ring-green-500">3</button>
          <button class="keypad-btn p-4 rounded-lg bg-white/10 text-white font-bold text-lg focus:outline-none focus:ring-2 focus:ring-green-500">4</button>
          <button class="keypad-btn p-4 rounded-lg bg-white/10 text-white font-bold text-lg focus:outline-none focus:ring-2 focus:ring-green-500">5</button>
          <button class="keypad-btn p-4 rounded-lg bg-white/10 text-white font-bold text-lg focus:outline-none focus:ring-2 focus:ring-green-500">6</button>
          <button class="keypad-btn p-4 rounded-lg bg-white/10 text-white font-bold text-lg focus:outline-none focus:ring-2 focus:ring-green-500">7</button>
          <button class="keypad-btn p-4 rounded-lg bg-white/10 text-white font-bold text-lg focus:outline-none focus:ring-2 focus:ring-green-500">8</button>
          <button class="keypad-btn p-4 rounded-lg bg-white/10 text-white font-bold text-lg focus:outline-none focus:ring-2 focus:ring-green-500">9</button>
          <button id="pinClear" class="keypad-btn col-span-1 p-4 rounded-lg bg-red-500/20 text-white font-bold text-lg focus:outline-none focus:ring-2 focus:ring-red-500">C</button>
          <button class="keypad-btn p-4 rounded-lg bg-white/10 text-white font-bold text-lg focus:outline-none focus:ring-2 focus:ring-green-500">0</button>
          <button id="pinBackspace" class="keypad-btn p-4 rounded-lg bg-blue-500/20 text-white font-bold text-lg focus:outline-none focus:ring-2 focus:ring-blue-500">⌫</button>
        </div>
      </div>
    </div>

    <!-- LOGIN SCREEN -->
    <div
      id="loginScreen"
      class="fixed inset-0 z-[60] bg-gradient-to-br from-[#1a2f26] via-[#101f18] to-black flex items-center justify-center p-4 transition-opacity duration-500 hidden"
    >
      <div
        class="absolute top-0 right-0 w-96 h-96 bg-green-500/10 rounded-full blur-3xl -z-10 mix-blend-screen"
      ></div>
      <div
        class="absolute bottom-0 left-0 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl -z-10 mix-blend-screen"
      ></div>

      <div
        class="backdrop-blur-xl bg-white/10 border border-white/20 p-8 rounded-[2rem] w-full max-w-md shadow-2xl relative z-10"
      >
        <div class="text-center mb-8">
          <div
            class="w-16 h-16 bg-[#1e5c33] rounded-full flex items-center justify-center text-white text-3xl shadow-lg mx-auto mb-4"
          >
            💰
          </div>
          <h1 class="text-2xl font-extrabold text-white tracking-tight">
            Catatan Keuangan
          </h1>
          <p class="text-green-100/70 text-sm mt-1">
            Masuk untuk mengelola dana
          </p>
        </div>

        <div class="space-y-4">
          <button
            onclick="handleGoogleLogin()"
            class="w-full bg-white text-gray-800 hover:bg-gray-100 font-extrabold py-3.5 rounded-xl transition shadow-md flex items-center justify-center gap-3 text-sm mt-6"
          >
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4"
              />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853"
              />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                fill="#FBBC05"
              />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335"
              />
            </svg>
            Lanjutkan dengan Google
          </button>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        GoogleAuthProvider,
        signInWithPopup,
        // Required for signInWithPassword, though not used due to HTML constraints
        // signInWithEmailAndPassword 
      } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
      // Import for Realtime Database (not explicitly imported here, but assumed available for RTDB URL)
      // import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";


      // KONEKSI DATABASE & AUTHENTICATION
      const firebaseConfig = {
        apiKey: "AIzaSyBKaa7F02csop4ocmmTwYksEE-oTKVkV0Q",
        authDomain: "buku-besar-keuangan.firebaseapp.com",
        projectId: "buku-besar-keuangan",
        storageBucket: "buku-besar-keuangan.firebasestorage.app",
        messagingSenderId: "153517228065",
        appId: "1:153517228065:web:590991b36a11e28bc1e360",
        measurementId: "G-QDVYYPH7DH",
        databaseURL:
          "https://buku-besar-keuangan-default-rtdb.asia-southeast1.firebasedatabase.app/",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      // const database = getDatabase(app); // Uncomment if using RTDB specific functions

      // --- DOM Elements ---
      const pinScreen = document.getElementById('pinScreen');
      const loginScreen = document.getElementById('loginScreen');
      const pinDisplay = document.getElementById('pinDisplay');
      const pinKeypad = document.getElementById('pinKeypad');
      const pinClearBtn = document.getElementById('pinClear');
      const pinBackspaceBtn = document.getElementById('pinBackspace');
      const pinIndicatorElements = pinDisplay.querySelectorAll('.pin-indicator');

      // --- State Variables ---
      let currentPin = '';
      const PIN_LENGTH = 4;
      const PIN_VERIFICATION_URL = 'https://buku-besar-keuangan-default-rtdb.asia-southeast1.firebasedatabase.app/konfigurasi_keamanan/pin_gerbang.json';
      const FIREBASE_AUTH_ENDPOINT = 'https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=AIzaSyBKaa7F02csop4ocmmTwYksEE-oTKVkV0Q';


      // --- Utility Functions ---
      window.pushNotification = function (pesan, jenis = "sukses") {
        const container = document.getElementById("toastContainer");
        const toast = document.createElement("div");
        let bgClass = "bg-[#1a2f26] border border-green-800 text-white";
        let icon = `<svg class="w-5 h-5 text-green-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;

        if (jenis === "error" || jenis === "peringatan") {
          bgClass = "bg-red-900 border border-red-800 text-white";
          icon = `<svg class="w-5 h-5 text-red-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
        }
        toast.className = `${bgClass} p-4 rounded-2xl shadow-2xl flex items-center gap-3 transition-all duration-300 opacity-0 -translate-y-4 pointer-events-auto font-bold text-xs tracking-wide`;
        toast.innerHTML = `${icon} <span>${pesan}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
          toast.classList.remove("opacity-0", "-translate-y-4");
          toast.classList.add("opacity-100", "translate-y-0");
        }, 10);
        setTimeout(() => {
          toast.classList.remove("opacity-100", "translate-y-0");
          toast.classList.add("opacity-0", "-translate-y-2");
          setTimeout(() => {
            toast.remove();
          }, 300);
        }, 3500);
      };

      function updatePinDisplay() {
        pinIndicatorElements.forEach((indicator, index) => {
          if (index < currentPin.length) {
            indicator.classList.add('pin-indicator-filled');
            indicator.classList.remove('pin-indicator-empty');
          } else {
            indicator.classList.remove('pin-indicator-filled');
            indicator.classList.add('pin-indicator-empty');
          }
        });
      }

      function resetPinInput() {
        currentPin = '';
        updatePinDisplay();
      }

      // --- PIN Screen Logic ---
      async function verifyPin() {
        if (currentPin.length !== PIN_LENGTH) return;

        try {
          const response = await fetch(PIN_VERIFICATION_URL);
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          const correctPin = await response.json();

          if (String(correctPin) === currentPin) {
            // PIN is correct, transition to login screen
            pinScreen.classList.add('opacity-0', '-translate-y-4');
            setTimeout(() => {
              pinScreen.classList.add('hidden');
              loginScreen.classList.remove('hidden', 'opacity-0', '-translate-y-4');
              setTimeout(() => loginScreen.classList.add('opacity-100', 'translate-y-0'), 10); // Smooth transition for login screen
            }, 300);
          } else {
            window.pushNotification("PIN Salah, Akses Ditolak!", "error");
            resetPinInput();
          }
        } catch (error) {
          console.error("Error verifying PIN:", error);
          window.pushNotification("Gagal memverifikasi PIN. Coba lagi.", "error");
          resetPinInput();
        }
      }

      // --- Login Form Logic ---
      const googleProvider = new GoogleAuthProvider();

      window.handleGoogleLogin = async function () {
        const loginButton = loginScreen.querySelector('button[onclick="handleGoogleLogin()"]');
        loginButton.disabled = true;
        const originalText = loginButton.innerHTML;
        loginButton.innerHTML = '<span>Memverifikasi...</span>';
        
        try {
          const result = await signInWithPopup(auth, googleProvider);
          window.location.href = "index.html";
        } catch (error) {
          console.error("Google Login Error:", error);
          window.pushNotification("Gagal masuk dengan Google: " + error.message, "error");
          loginButton.disabled = false;
          loginButton.innerHTML = originalText;
        }
      };

      // --- Initialization ---
      document.addEventListener("DOMContentLoaded", function () {
        // 1. Initial State: PIN screen visible, Login screen hidden
        pinScreen.classList.remove('hidden');
        loginScreen.classList.add('hidden');
        resetPinInput(); // Ensure PIN display is reset on load

        // Add event listeners for keypad buttons
        pinKeypad.querySelectorAll('.keypad-btn').forEach(button => {
          button.addEventListener('click', () => {
            const value = button.textContent;

            if (!isNaN(value)) { // Number button
              if (currentPin.length < PIN_LENGTH) {
                currentPin += value;
                updatePinDisplay();
                if (currentPin.length === PIN_LENGTH) {
                  verifyPin();
                }
              }
            } else if (value === 'C') { // Clear button
              resetPinInput();
            } else if (value === '⌫') { // Backspace button
              if (currentPin.length > 0) {
                currentPin = currentPin.slice(0, -1);
                updatePinDisplay();
              }
            }
          });
        });

        // Google login is handled via inline onclick on the button in the HTML


        // 2. Check auth state to potentially skip PIN/Login if already logged in
        onAuthStateChanged(auth, (user) => {
          if (user) {
            // User is already logged in, redirect to dashboard
            window.location.href = "index.html";
          } else {
            // User is not logged in, ensure PIN screen is shown and login is hidden
            pinScreen.classList.remove('hidden');
            loginScreen.classList.add('hidden');
            resetPinInput();
          }
        });
      });
    </script>
  </body>
</html>
